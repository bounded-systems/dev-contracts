[env]
# Project configuration
NODE_ENV = "development"

# Trunk configuration
TRUNK_YAML_PATH = "templates/trunk/.trunk/trunk.yaml" # Path to the *template* trunk.yaml used for transformations
PUSHD_ROOT_TRUNK_YAML = ".trunk/trunk.yaml"         # Path to the *root* trunk.yaml that gets updated

# DevTools Environment (set by mise)
PUSHD_DEVTOOLS_DIR = "{{config_root}}"

[tools]
# Core Runtime Tool versions
ruby = "3.3.3"
node = "20.14.0"

[tasks]
# Default install task (ensures tools are installed)
[tasks.install]
run = "mise install"

# Trunk tasks
[tasks.trunk-check]
run = "trunk check --ci"
depends = ["trunk-fmt"]
description = "Run Trunk checks"

[tasks.trunk-fmt]
run = "trunk fmt"
depends = ["trunk-upgrade-and-sync"]
description = "Format code using Trunk"

[tasks.trunk-upgrade]
run = "trunk upgrade"
depends = ["install"]
description = "Upgrade Trunk plugins"

# Sync trunk.yaml versions back to mise.toml
[tasks.sync-trunk-versions]
run = "deno run -A scripts/sync-trunk-versions.ts"
depends = ["install"] # Depends on deno being installed
description = "Sync linter versions from .trunk/trunk.yaml to mise.toml"

# Combined upgrade and sync task
[tasks.trunk-upgrade-and-sync]
depends = ["trunk-upgrade", "sync-trunk-versions"]
description = "Upgrade Trunk plugins and sync versions back to mise.toml"

# Apply Transformation Task
[tasks.transform-apply]
run = "deno run -A scripts/transform-apply.ts $MISE_ARGS"
description = "Apply generated transformations (e.g., mise.toml -> trunk.yaml)"

# README Generation Task
[tasks.generate-readme]
run = "deno run -A scripts/generate-readme.ts"
depends = ["install"]
description = "Generate README.md from readme-schema.yaml"

# Check Contract Files Task
[tasks.check-contracts]
run = "deno run -A scripts/check-contracts.ts"
depends = ["install"]
description = "Check if all contract files exist in the project root"

# Deno tasks
[tasks.deno-test]
run = "deno test"
depends = ["install"]
description = "Run Deno tests"

# Enable lockfile for consistent versioning across environments
[settings]
lockfile = true

# DevTools specific settings for integration (e.g., with Trunk) - moved to [_] below

# Custom data under the '_' table
[_]
# Project information
[_.project]
name = "Pushd DevTools"
description = "A centralized and sandboxed environment for development tools, configurations, and their associated runtimes"
problem_statement = """
Core projects often rely on specific, sometimes outdated, runtime versions. This
dependency can prevent the adoption of newer development tools which require
more recent runtimes. Upgrading core project runtimes directly can be complex,
risky, and time-consuming.
"""
solution = """
Sandboxed & Linked Tooling that acts as a central, up-to-date source for development tools and
their necessary environments through:

1. **Sandboxing:** Tools and runtimes are managed within this repository,
   separate from target projects
2. **Symlinking:** Configuration directories (`.vscode` and `.trunk`) are
   maintained as templates and symlinked into target projects
3. **Git Exclusion:** Target projects exclude these symlinked directories in
   their `.gitignore` files
"""

# Contract definitions
[_.contracts.definitions]
[[_.contracts.definitions.items]]
id = "repo-contract"
title = "pushd-devtools Repository Contract"
provides = [
  "Managed tool versions via mise.toml",
  "Configuration templates in the templates/ directory",
  "Transformation logic between configuration formats",
  "Scripts for synchronizing configurations"
]
expects = [
  "mise to be installed on the developer's machine",
  "PUSHD_DEVTOOLS_DIR environment variable to be set",
  "Target projects to implement the Target Project Contract"
]
guarantees = [
  "Tool versions will be compatible with templates",
  "Templates will be kept in sync with tool versions",
  "Configuration transformations will be bidirectional and consistent"
]

[[_.contracts.definitions.items]]
id = "target-project-contract"
title = "Target Project Contract"
provides = [
  "A workspace to place symlinked configurations",
  "A .gitignore file that excludes the symlinked directories"
]
expects = [
  "Access to the pushd-devtools repository via PUSHD_DEVTOOLS_DIR",
  "Scripts to set up appropriate symlinks"
]
guarantees = [
  "Will not modify the symlinked configurations directly",
  "Will not commit the symlinked configurations to version control"
]

[[_.contracts.definitions.items]]
id = "mise-contract"
title = "mise Tool Manager Contract"
provides = [
  "Tool version management via mise.toml",
  "Task definitions in mise.toml",
  "Consistent environment variables"
]
expects = [
  "mise to be installed",
  "Tool versions to be specified in mise.toml"
]
guarantees = [
  "Tools will be installed in isolated environments",
  "Tasks will run with the correct tool versions",
  "Environment variables will be consistent"
]

# Setup information
[_.setup]
[_.setup.prerequisites]
devtools = [
  "Git for cloning this repository",
  "mise version manager (formerly rtx)"
]
target_projects = [
  "Git",
  "Unix-like shell environment",
  "Editor extensions for full functionality"
]

[[_.setup.installation]]
step = "Clone this Repository"
code = "git clone <repository-url> ~/dev/pushd-devtools"

[[_.setup.installation]]
step = "Install mise"
detail = "Install mise on your system (from https://mise.jdx.dev/)"

[[_.setup.installation]]
step = "Install required tools"
code = "mise install"

[[_.setup.installation]]
step = "Set Environment Variable"
code = """
export PUSHD_DEVTOOLS_DIR="$HOME/dev/pushd-devtools"
"""
detail = "Add to your shell configuration file (e.g., `~/.zshrc`)"

[[_.setup.installation]]
step = "Linking Configurations"
detail = "Create symlinks from the templates to your target project"
code = """
# From your target project directory
ln -s "$PUSHD_DEVTOOLS_DIR/templates/vscode" .vscode
ln -s "$PUSHD_DEVTOOLS_DIR/templates/trunk" .trunk
"""
gitignore = """
.vscode/
.trunk/
"""

# IDE integration
[_.ide_integration]
vscode = [
  "Install the [mise-vscode](https://github.com/hverlin/mise-vscode/) extension",
  "The extension will automatically configure other tools to use mise-managed versions"
]
jetbrains = [
  "Install the [intellij-mise](https://github.com/134130/intellij-mise) plugin",
  "Add mise shims to your PATH"
]
vim_neovim = { 
  code = """
" Vim
let $PATH = $HOME . '/.local/share/mise/shims:' . $PATH
""", 
  code_alt = """
-- Neovim
vim.env.PATH = vim.env.HOME .. "/.local/share/mise/shims:" .. vim.env.PATH
"""
}

# Roadmap information
[_.roadmap]
[[_.roadmap.immediate_priorities]]
title = "Documentation-Code Consistency"
items = [
  "Implement missing scripts referenced in documentation (`setup.ts`, `link-configs.ts`)",
  "Create validation scripts to ensure README accuracy"
]

[[_.roadmap.immediate_priorities]]
title = "Contract Enforcement"
items = [
  "Add runtime validations to ensure contracts are followed",
  "Implement automated tests for each contract boundary"
]

[[_.roadmap.immediate_priorities]]
title = "Documentation Generation"
items = [
  "Add JSDoc/TSDoc comments to all script files",
  "Create a documentation generator that pulls from mise.toml, scripts, and templates"
]

[[_.roadmap.future_enhancements]]
title = "Configuration Validation Schema"
items = [
  "Formal schema definitions for all configuration files",
  "Runtime validation of configurations against schemas"
]

[[_.roadmap.future_enhancements]]
title = "Integration Testing"
items = [
  "Automated tests that verify end-to-end functionality",
  "CI/CD pipeline to validate changes against contracts"
]

[[_.roadmap.future_enhancements]]
title = "Self-Healing Configuration"
items = [
  "Automatic repair of broken symlinks",
  "Detection and resolution of configuration conflicts"
]

[_.devtools.trunk]
enabled_linters = [
  { name = "standardrb", version = "1.3.0" },
  { name = "yamllint", version = "1.37.0" },
  { name = "git-diff-check" }, # No version needed, it's a system tool
  { name = "deno", version = "2.2.8" },
]

[_.contracts.structure]

[_.contracts.structure.".git"]
type = "artifact"
purpose = "Git version control data"

[_.contracts.structure.".github"]
type = "contract"
purpose = "GitHub workflows and configuration"

[_.contracts.structure.".gitignore"]
type = "contract"
purpose = "Defines files excluded from version control"

[_.contracts.structure.".ruby-lsp"]
type = "artifact"
purpose = "Ruby language server configuration"

[_.contracts.structure.".trunk"]
type = "artifact"
depends_on = ["templates/trunk/", "mise.toml"]
affects = ["mise.toml"]
purpose = "Generated/symlinked Trunk configuration"
files = {}

[_.contracts.structure.".vscode"]
type = "artifact"
depends_on = ["templates/vscode/"]
purpose = "Symlinked VSCode configuration"
files = {}

[_.contracts.structure."README.md"]
type = "artifact"
depends_on = ["readme-schema.yaml"]
purpose = "Generated documentation"

[_.contracts.structure."deno.json"]
type = "contract"
purpose = "Deno runtime configuration"

[_.contracts.structure."deno.lock"]
type = "artifact"
depends_on = ["deno.json"]
purpose = "Locked Deno dependencies"

[_.contracts.structure."mise.toml"]
type = "contract"
affects = [".trunk/trunk.yaml"]
purpose = "Source of truth for tool versions and tasks"
description = "Tool versions, environment variables, and tasks"

[_.contracts.structure."readme-schema.yaml"]
type = "contract"
affects = ["README.md"]
purpose = "Schema for README generation"

[_.contracts.structure."runtimes"]
type = "static"
purpose = "Runtime environments"

[_.contracts.structure."scripts"]
type = "static"
purpose = "Container for transformation scripts"
description = "Helper scripts for setup and configuration"
children = [
  { path = "sync-trunk-versions.ts", description = "Syncs versions from Trunk to mise" },
  { path = "transform-apply.ts", description = "Applies configuration transformations" },
  { path = "generate-readme.ts", description = "Generates README.md from schema" }
]

[_.contracts.structure."src"]
type = "static"
purpose = "Source code for transformation logic"
description = "Source code for transformations and utilities"
children = [
  { path = "transformation/", description = "Transformation engine", children = [
    { path = "engine/", description = "Core transformation logic" }
  ]}
]

[_.contracts.structure."templates"]
type = "contract"
purpose = "Source templates for symlinked configurations"
description = "Configuration templates for symlinks"
children = [
  { path = "trunk/", description = "Trunk.io configuration" },
  { path = "vscode/", description = "VS Code settings and extensions" }
]

[_.contracts.structure."tests"]
type = "static"
purpose = "Test files"

[_.contracts.structure."types"]
type = "static"
purpose = "TypeScript type definitions"
