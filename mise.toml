[env]
# Project configuration
PROJECT_NAME = "pushd-devtools"
NODE_ENV = "development"

# Directory structure
RUNTIMES_DIR = "runtimes"
RUBY_RUNTIME_DIR = "runtimes/ruby"
NODE_RUNTIME_DIR = "runtimes/node"

# File names
GEMFILE_NAME = "Gemfile"
PACKAGE_JSON_NAME = "package.json"
TOOL_VERSIONS_NAME = "mise.toml"

# Package information
PACKAGE_VERSION = "1.0.0"
PACKAGE_DESCRIPTION = "Pushd Development Tools"

# Ruby configuration
RUBY_GEMS_SOURCE = "https://rubygems.org"
RUBY_HOME_VAR = "GEM_HOME"
RUBY_ENV_PREFIX = "BUNDLE_"

# Node configuration
NODE_ENV_PREFIX = "NODE_"
NODE_PACKAGE_VAR = "PACKAGE_FILE"

# Trunk configuration
TRUNK_YAML_PATH = "templates/trunk/.trunk/trunk.yaml"
TRUNK_TEMPLATE_DIR = "templates/trunk"

# YAML schema configuration
YAMLLINT_CONFIG_PATH = ".yamllint"
VSCODE_SETTINGS_PATH = ".vscode/settings.json"

# Path enhancement for node binaries
_.path = "./node_modules/.bin"

[tools]
# Tool versions
ruby = "3.3.3"
node = "20.14.0"
deno = "2.2.4"
trunk = "1.22.12"

# Add linters as tools
prettier = "3.5.3"
eslint = "9.24.0"
standardrb = "1.49.0"
markdownlint = "0.44.0"
git-diff-check = "enabled"
shellcheck = "0.10.0"
oxipng = "9.1.4"
js-yaml = "4.1.0"
ts-node = "10.9.2"
typescript = "5.3.3"
types-js-yaml = "4.0.9"
yamllint = "1.37.0"
debug = "latest"

# Deno imports
std = "0.224.0"
zod = "latest"
std-fs = "0.229.3"
std-path = "0.225.0"
std-yaml = "0.224.0"
std-toml = "0.224.0"

# Add Trunk actions as tools
# Unlike linters which have versions, actions are just enabled/disabled
trunk-upgrade-available = "enabled"
trunk-check-pre-push = "enabled"
trunk-check-pre-commit = "enabled"

[tasks]
# Default install task (ensures tools are installed)
[tasks.install]
run = "mise install"

# Deno test tasks
[tasks.deno_test]
run = "deno test --allow-run --allow-read --allow-env"
depends = ["install"]

[tasks.deno_test_watch]
run = "deno test --allow-run --allow-read --allow-env --watch"
depends = ["install"]
description = "Run tests in watch mode"

[tasks.deno_test_coverage]
run = "deno test --allow-run --allow-read --allow-env --coverage=coverage && deno coverage coverage"
depends = ["install"]
description = "Run tests and generate coverage report"

[tasks.deno_test_schemas]
run = "deno test --allow-read --allow-write --allow-net --allow-env --no-check scripts/generate_schema_types.test.ts"
depends = ["install"]
description = "Run tests for the schema validator"

# Setup and configuration tasks
[tasks.setup]
run = "deno run -A scripts/setup.ts"
depends = ["install"]
description = "Run initial project setup"

[tasks.config_link]
run = "deno run -A scripts/link-configs.ts"
depends = ["install"]
description = "Link configuration files"

[tasks.config_generate]
run = "deno run -A scripts/generate_configs.ts"
depends = ["install"]
description = "Generate config files from mise.toml"

[tasks.config_generate_env]
run = "deno run -A scripts/generate_env.ts"
depends = ["install"]
description = "Generate environment file"

# Schema and validation tasks
[tasks.schema_validate]
run = "deno run -A scripts/generate_schema_types.ts"
depends = ["install"]
description = "Validate schemas, generate TypeScript interfaces, and ensure consistency between mise.toml and trunk.yaml"

[tasks.schema_transform]
run = "deno run -A scripts/update_trunk.ts"
depends = ["install"]
description = "Update trunk.yaml to match mise.toml configuration"

[tasks.schema_legacy_transform]
run = "deno run -A scripts/generate_schema_types.ts --transform"
depends = ["install"]
description = "Legacy task to validate schemas and update trunk.yaml using the old script"

[tasks.schema_sync_yaml]
run = "deno run -A scripts/sync_yaml_schemas.ts"
depends = ["install"]
description = "Sync YAML schemas"

# Trunk tasks
[tasks.trunk_check]
run = "trunk check --ci"
depends = ["install"]
description = "Run Trunk checks"

[tasks.trunk_fmt]
run = "trunk fmt"
depends = ["install"]
description = "Format code using Trunk"

[tasks.trunk_upgrade]
run = "trunk upgrade"
depends = ["install"]
description = "Upgrade Trunk plugins"

[tasks.trunk_validate]
run = "deno run -A scripts/validate_trunk.ts"
depends = ["install"]
description = "Validate Trunk configuration"

# Project-wide validation and updates
[tasks.sync_validate]
run = "deno run -A scripts/sync_validate.ts"
depends = ["install"]
description = "Validate and sync configuration files"

[tasks.update_all]
depends = ["config_generate"]
run = "deno run -A scripts/run_installs.ts"
description = "Generate configs and install dependencies"

# Enable lockfile for consistent versioning across environments
[settings]
lockfile = true
