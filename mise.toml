[env]
# Project configuration
NODE_ENV = "development"

# Trunk configuration
TRUNK_YAML_PATH = "templates/trunk/.trunk/trunk.yaml" # Path to the *template* trunk.yaml used for transformations
PUSHD_ROOT_TRUNK_YAML = ".trunk/trunk.yaml"         # Path to the *root* trunk.yaml that gets updated

# DevTools Environment (set by mise)
PUSHD_DEVTOOLS_DIR = "{{config_root}}"

[tools]
# Core Runtime Tool versions
ruby = "3.3.3"
node = "20.14.0"

[tasks]
# Default install task (ensures tools are installed)
[tasks.install]
run = "mise install"

# Trunk tasks
[tasks.trunk-check]
run = "trunk check --ci"
depends = ["trunk-fmt"]
description = "Run Trunk checks"

[tasks.trunk-fmt]
run = "trunk fmt"
depends = ["trunk-upgrade-and-sync"]
description = "Format code using Trunk"

[tasks.trunk-upgrade]
run = "trunk upgrade"
depends = ["install"]
description = "Upgrade Trunk plugins"

# Sync trunk.yaml versions back to mise.toml
[tasks.sync-trunk-versions]
run = "deno run -A scripts/sync-trunk-versions.ts"
depends = ["install"] # Depends on deno being installed
description = "Sync linter versions from .trunk/trunk.yaml to mise.toml"

# Combined upgrade and sync task
[tasks.trunk-upgrade-and-sync]
depends = ["trunk-upgrade", "sync-trunk-versions"]
description = "Upgrade Trunk plugins and sync versions back to mise.toml"

# Apply Transformation Task
[tasks.transform-apply]
run = "deno run -A scripts/transform-apply.ts $MISE_ARGS"
description = "Apply generated transformations (e.g., mise.toml -> trunk.yaml)"

# Deno tasks
[tasks.deno-test]
run = "deno test"
depends = ["install"]
description = "Run Deno tests"

# Enable lockfile for consistent versioning across environments
[settings]
lockfile = true

# DevTools specific settings for integration (e.g., with Trunk) - moved to [_] below

# Custom data under the '_' table
[_]
[_.devtools.trunk]
enabled_linters = [
  { name = "standardrb", version = "1.3.0" },
  { name = "yamllint", version = "1.37.0" },
  { name = "git-diff-check" }, # No version needed, it's a system tool
  { name = "deno", version = "2.2.8" },
]
