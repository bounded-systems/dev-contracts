[env]
# Project configuration
NODE_ENV = "development"

# Trunk configuration
TRUNK_YAML_PATH = "templates/trunk/.trunk/trunk.yaml" # Path to the *template* trunk.yaml used for transformations
PUSHD_ROOT_TRUNK_YAML = ".trunk/trunk.yaml"         # Path to the *root* trunk.yaml that gets updated

# DevTools Environment (set by mise)
PUSHD_DEVTOOLS_DIR = "{{config_root}}"

# Reference to external configuration files
CONTRACTS_FILE = "contracts.toml"
# SETUP_FILE = "setup.toml" # Removed - Consolidated into [_] section below
# ROADMAP_FILE = "roadmap.toml" # Removed - Replaced by skipped Deno tests

# Consolidated Setup/IDE Info (for schema generation)
[_]
  [_.setup]
    [_.setup.prerequisites]
    devtools = [
      "Git for cloning this repository",
      "mise version manager (formerly rtx)",
      "Deno runtime for setup scripts"
    ]
    target_projects = [
      "Git",
      "Unix-like shell environment",
      "Editor extensions for full functionality"
    ]

    [[_.setup.installation]]
    step = "Clone this Repository"
    code = "deno run -A https://raw.githubusercontent.com/yourusername/pushd-devtools/main/scripts/clone.ts"
    detail = "Clone the pushd-devtools repository to your local machine (defaults to ~/dev/pushd-devtools)"

    [[_.setup.installation]]
    step = "Clone with Custom Options"
    code = "deno run -A https://raw.githubusercontent.com/yourusername/pushd-devtools/main/scripts/clone.ts [repo-url] [destination-path]"
    detail = "Clone with a custom repository URL and destination path"

    [[_.setup.installation]]
    step = "Install required tools"
    code = "cd ~/dev/pushd-devtools && mise install"
    detail = "Navigate to the repository and install required tools"

    [[_.setup.installation]]
    step = "Set Environment Variable and Create Symlinks"
    code = "cd ~/dev/pushd-devtools && mise run setup-all"
    detail = "Run the setup tasks that will configure your environment and create symlinks"

    [[_.setup.installation]]
    step = "Alternative: Manual Setup Steps"
    detail = "If you prefer to run each step individually:"
    code = """
# Set environment variable
cd ~/dev/pushd-devtools && mise run setup-env

# Create symlinks (from target project directory)
cd ~/your-project && mise -C ~/dev/pushd-devtools run setup-symlinks
"""

    [_.setup.gitignore]
    content = """
.vscode/
.trunk/
"""
    detail = "Add these lines to your target project's .gitignore file to exclude symlinked directories"


  [_.ide_integration]
    vscode = [
      "Install the [mise-vscode](https://github.com/hverlin/mise-vscode/) extension",
      "The extension will automatically configure other tools to use mise-managed versions"
    ]
    jetbrains = [
      "Install the [intellij-mise](https://github.com/134130/intellij-mise) plugin",
      "Add mise shims to your PATH"
    ]

    [_.ide_integration.vim_neovim]
    code = """
" Vim
let $PATH = $HOME . '/.local/share/mise/shims:' . $PATH
"""
    code_alt = """
-- Neovim
vim.env.PATH = vim.env.HOME .. "/.local/share/mise/shims:" .. vim.env.PATH
"""

[tools]
# Core Runtime Tool versions
ruby = "3.3.3"
node = "20.14.0"
deno = "latest"

[tasks]
# Default install task (ensures tools are installed)
[tasks.install]
run = "mise install"

# Setup tasks
[tasks.setup-symlinks]
run = "deno run -A scripts/setup.ts symlinks"
depends = ["install"]
description = "Create symlinks from pushd-devtools templates to target project"

[tasks.setup-env]
run = "deno run -A scripts/setup.ts env"
depends = ["install"]
description = "Configure PUSHD_DEVTOOLS_DIR environment variable in shell configuration"

[tasks.setup-all]
depends = ["install", "setup-env", "setup-symlinks"]
description = "Run all setup steps (install tools, configure environment, create symlinks)"

# Trunk tasks
[tasks.trunk-check]
run = "trunk check --ci"
depends = ["trunk-fmt"]
description = "Run Trunk checks"

[tasks.trunk-fmt]
run = "trunk fmt"
depends = ["trunk-upgrade-and-sync"]
description = "Format code using Trunk"

[tasks.trunk-upgrade]
run = "trunk upgrade"
depends = ["install"]
description = "Upgrade Trunk plugins"

# Sync trunk.yaml versions back to mise.toml
[tasks.sync-trunk-versions]
run = "deno run -A scripts/sync-trunk-versions.ts"
depends = ["install"] # Depends on deno being installed
description = "Sync linter versions from .trunk/trunk.yaml to mise.toml"

# Combined upgrade and sync task
[tasks.trunk-upgrade-and-sync]
depends = ["trunk-upgrade", "sync-trunk-versions"]
description = "Upgrade Trunk plugins and sync versions back to mise.toml"

# Apply Transformation Task
[tasks.transform-apply]
run = "deno run -A scripts/transform-apply.ts $MISE_ARGS"
description = "Apply generated transformations (e.g., mise.toml -> trunk.yaml)"

# Generate README Schema Task
[tasks.generate-schema]
run = "deno run -A scripts/generate-schema-from-mise.ts && trunk fmt"
depends = ["install"]
description = "Generate readme.yml from mise.toml and format using Trunk"

# Validate README Schema Task
[tasks.validate-schema]
run = "deno run -A scripts/validate-readme-schema.ts"
depends = ["generate-schema"]
description = "Validate readme.yml against the JSON schema"

# Update README Generation Task to depend on schema generation and run formatter
[tasks.generate-readme]
run = "deno run -A scripts/generate-readme.ts && trunk fmt"
depends = ["install", "generate-schema", "validate-schema"]
description = "Generate README.md from readme.yml and format using Trunk"

# Check Contract Files Task
[tasks.check-contracts]
run = "deno run -A scripts/check-contracts.ts"
depends = ["install"]
description = "Check if all required contract files (e.g., contracts.toml) exist in the project root, based on mise.toml config."

# Deno tasks
[tasks.deno-test]
run = "deno test"
depends = ["install"]
description = "Run Deno tests"

# Clone task (no dependencies as it's meant to be run before mise is even installed)
[tasks.clone]
run = "deno run -A scripts/clone.ts $MISE_ARGS"
description = "Clone the pushd-devtools repository (pass repo URL and destination path as arguments)"

# Enable lockfile for consistent versioning across environments
[settings]
lockfile = true

[tasks.generate-gitignore]
run = "deno run -A scripts/generate-gitignore.ts"
depends = ["install"]
description = "Generate .gitignore file from contracts.toml structure"

[tasks.contracts-validate-structure]
run = "deno run -A --unstable-fs scripts/validate-contracts-structure.ts"
description = "Validate that the repository structure matches contracts.toml (including schema check)"
depends = ["contracts-sort-structure"]

[tasks.contracts-add-untracked]
run = "deno run -A --unstable-fs scripts/validate-contracts-structure.ts --add-untracked"
description = "Add untracked files/directories found on the filesystem to contracts.toml [structure]"
depends = ["install"]

[tasks.contracts-generate-structure]
run = "deno run -A --unstable-fs scripts/generate-contracts-structure.ts"
description = "Create missing files/directories defined in contracts.toml [structure] (skips symlinks)"
depends = ["install"]

[tasks.contracts-prune-structure]
run = "deno run -A --unstable-fs scripts/prune-contracts-structure.ts"
description = "Remove entries from contracts.toml [structure] that do not exist on the filesystem"
depends = ["install", "contracts-sort-structure"]

[tasks.contracts-sort-structure]
run = "deno run -A scripts/sort-contracts-structure.ts"
description = "Sort and deduplicate the [structure] section in contracts.toml"
depends = ["install"]

[tasks.contracts-clean]
description = "Prune, generate, and sort the contracts.toml [structure] section"
depends = ["contracts-prune-structure", "contracts-generate-structure", "contracts-sort-structure"]

[tasks.contracts-delete-empty-dirs]
run = "deno run -A --unstable-fs scripts/delete-empty-dirs.ts"
description = "Delete empty directories defined in contracts.toml [structure] if allow_empty_directory=false"
depends = ["install"] # Depends on deno
