[env]
# Project configuration
PROJECT_NAME = "pushd-devtools"
NODE_ENV = "development"

# Directory structure
RUNTIMES_DIR = "runtimes"
RUBY_RUNTIME_DIR = "runtimes/ruby"
NODE_RUNTIME_DIR = "runtimes/node"

# File names
GEMFILE_NAME = "Gemfile"
PACKAGE_JSON_NAME = "package.json"
TOOL_VERSIONS_NAME = "mise.toml"

# Package information
PACKAGE_VERSION = "1.0.0"
PACKAGE_DESCRIPTION = "Pushd Development Tools"

# Ruby configuration
RUBY_GEMS_SOURCE = "https://rubygems.org"

# Environment variable prefixes
RUBY_ENV_PREFIX = "BUNDLE_"
NODE_ENV_PREFIX = "NODE_"

# Special environment variables
RUBY_HOME_VAR = "GEM_HOME"
NODE_PACKAGE_VAR = "PACKAGE_FILE"

# Trunk configuration
TRUNK_YAML_PATH = "templates/trunk/.trunk/trunk.yaml"
TRUNK_TEMPLATE_DIR = "templates/trunk"
TRUNK_CLI_VERSION = "1.22.12"

# YAML schema configuration
YAMLLINT_CONFIG_PATH = ".yamllint"
VSCODE_SETTINGS_PATH = ".vscode/settings.json"

[tools]
deno = "2.2.4"
nodejs = "20.14.0"
ruby = "3.3.3"
trunk = "1.22.12"
# Add linters as tools
prettier = "3.5.3"
eslint = "9.24.0"
standardrb = "1.49.0"
markdownlint = "0.44.0"
git-diff-check = "enabled"
shellcheck = "0.10.0"

# Add Trunk actions as tools
# Unlike linters which have versions, actions are just enabled/disabled
trunk-upgrade-available = "enabled"
trunk-check-pre-push = "enabled"
trunk-check-pre-commit = "enabled"

[tasks]

# Tasks migrated from scripts/deno.json
[tasks.test]
run = "deno test --allow-run --allow-read --allow-env"
depends = ["install"]

[tasks.test_watch]
run = "deno test --allow-run --allow-read --allow-env --watch"
depends = ["install"]
description = "Run tests in watch mode"

[tasks.test_coverage]
run = "deno test --allow-run --allow-read --allow-env --coverage=coverage && deno coverage coverage"
depends = ["install"]
description = "Run tests and generate coverage report"

# Tasks for standalone scripts
[tasks.setup]
run = "deno run -A scripts/setup.ts"
depends = ["install"]
description = "Run initial project setup"

[tasks.link_configs]
run = "deno run -A scripts/link-configs.ts"
depends = ["install"]
description = "Link configuration files"

[tasks.validate_trunk]
run = "deno run -A scripts/validate_trunk.ts"
depends = ["install"]
description = "Validate Trunk configuration"

[tasks.sync_yaml_schemas]
run = "deno run -A scripts/sync_yaml_schemas.ts"
depends = ["install"]
description = "Sync YAML schemas"

[tasks.generate_env]
run = "deno run -A scripts/generate_env.ts"
depends = ["install"]
description = "Generate environment file"

# Trunk tasks
[tasks.trunk_check]
run = "trunk check --ci"
depends = ["install"]
description = "Run Trunk checks"

[tasks.trunk_fmt]
run = "trunk fmt"
depends = ["install"]
description = "Format code using Trunk"

[tasks.trunk_upgrade]
run = "trunk upgrade"
depends = ["install"]
description = "Upgrade Trunk plugins"

# Consistency Check
[tasks.sync_validate]
run = "deno run -A scripts/sync_validate.ts"
depends = ["install"]
description = "Validate and sync configuration files"

# Config Generation
[tasks.generate_configs]
run = "deno run -A scripts/generate_configs.ts"
depends = ["install"]
description = "Generate config files from mise.toml"

[tasks.update_all]
depends = ["generate_configs"]
run = "deno run -A scripts/run_installs.ts"
description = "Generate configs and install dependencies"

# Default install task (ensures tools are installed)
[tasks.install]
run = "mise install"

# New task to validate schemas and generate types
[tasks.validate_schemas]
run = "deno run -A scripts/generate_schema_types.ts"
depends = ["install"]
description = "Validate schemas, generate TypeScript interfaces, and ensure consistency between mise.toml and trunk.yaml"

# New task to run schema validator tests
[tasks.test_schemas]
run = "deno test --allow-read --allow-write --allow-net --allow-env --no-check scripts/generate_schema_types.test.ts"
depends = ["install"]
description = "Run tests for the schema validator"

# New task to transform schemas
[tasks.transform_schemas]
run = "deno run -A scripts/update_trunk.ts"
depends = ["install"]
description = "Update trunk.yaml to match mise.toml configuration"

# New task to run the old schema transformer script (if needed)
[tasks.legacy_transform_schemas]
run = "deno run -A scripts/generate_schema_types.ts --transform"
depends = ["install"]
description = "Legacy task to validate schemas and update trunk.yaml using the old script"

# --- End of Tasks ---

[settings]
# Add any mise specific settings here, like experimental = true
# ... keep existing settings if any ...

# --- Central Devtools Configuration (Custom) ---
# This section defines the dependencies and settings used to generate
# various configuration files (Gemfile, package.json, deno.json, trunk.yaml, .ruby-version)
[settings.devtools]
description = "Central configuration for generating project files."

[settings.devtools.ruby]
# The Ruby version is taken from the main [tools] section (e.g., tools.ruby)
source = "https://rubygems.org"
gems = [
  # From runtimes/ruby/Gemfile & trunk.yaml
  { name = "standardrb", version = "1.49.0", groups = [
    "lint",
  ] }, # Matches trunk
  { name = "yamllint", version = "1.37.0", groups = [
    "lint",
  ] }, # Matches trunk
  { name = "debug", version = "latest", groups = [
    "development",
  ] },
  # Add other gems like rubocop, etc. here if needed, ensure versions match trunk if applicable
]

[settings.devtools.node]
# The Node version is taken from the main [tools] section (e.g., tools.nodejs)
package_name = "pushd-devtools-node-runtime"
package_version = "1.0.0" # Corresponds to runtimes/node/package.json
description = "Node.js runtime for Pushd DevTools"
private = true
dependencies = [
  # From runtimes/node/package.json
  { name = "js-yaml", version = "^4.1.0" },
]
dev_dependencies = [
  # From runtimes/node/package.json & trunk.yaml
  { name = "prettier", version = "3.5.3" },        # Matches trunk
  { name = "ts-node", version = "^10.9.2" },
  { name = "typescript", version = "^5.3.3" },
  { name = "@types/js-yaml", version = "^4.0.9" },
  { name = "eslint", version = "9.24.0" },         # Matches trunk
]

[settings.devtools.deno]
# The Deno version is taken from the main [tools] section (e.g., tools.deno)
imports = [
  # From scripts/deno.json
  { name = "std/", url = "https://deno.land/std@0.224.0/" }, # Pinned std version
  { name = "zod", url = "https://deno.land/x/zod/mod.ts" },
  # Imports needed for generate_configs.ts script itself
  { name = "jsr:@std/fs/exists", url = "jsr:@std/fs@^0.229.3/exists" },
  { name = "jsr:@std/path", url = "jsr:@std/path@^0.225.0" },
  { name = "jsr:@std/yaml", url = "jsr:@std/yaml@^0.224.0" },
  { name = "jsr:@std/toml", url = "jsr:@std/toml@^0.224.0" },
]

[settings.devtools.trunk]
# The Trunk CLI version is taken from the main [tools] section (e.g., tools.trunk)
# The Ruby and Node runtime versions for Trunk are also taken from the main [tools] section.
# Linters are now defined in the tools section above and will be enabled
# if they are in the approved linter list
# Actions are now defined in the tools section above and will be enabled
# if they are valid Trunk actions
