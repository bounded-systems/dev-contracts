# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.12
lint:
  enabled:
    - standardrb@1.49.0
    - yamllint@1.37.0
    - prettier@3.5.3
    - eslint@9.24.0
  disabled:
    - rufo
    - brakeman
    - rubocop-rails
    - bundler-audit
    - rubocop
actions:
  enabled:
    - trunk-upgrade-available
    - trunk-fmt-pre-commit
    - trunk-check-pre-push
  disabled:
    - trunk-announce
runtimes:
  enabled:
    - ruby@3.2.2
    - node@18.20.5
  definitions:
    - type: ruby
      runtime_environment:
        - name: BUNDLE_GEMFILE
          value: "$PUSHD_DEVTOOLS_DIR/runtimes/ruby/Gemfile"
        - name: BUNDLE_PATH
          value: "$PUSHD_DEVTOOLS_DIR/runtimes/ruby/vendor/bundle"
        - name: BUNDLE_WITHOUT
          value: "production:staging"
        - name: GEM_HOME
          value: "$PUSHD_DEVTOOLS_DIR/runtimes/ruby/vendor/bundle"
    - type: node
      version: 18.20.5
      runtime_environment:
        - name: NODE_ENV
          value: development
        - name: PACKAGE_FILE
          value: $PUSHD_DEVTOOLS_DIR/runtimes/node/package.json
plugins:
  sources:
    - id: trunk
      ref: v1.6.7
      uri: https://github.com/trunk-io/plugins
