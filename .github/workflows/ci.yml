name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - name: type-check
        run: deno check mod.ts spec/mod.ts
      - name: test
        run: deno test --allow-read --allow-net --allow-write spec/
      - name: publish dry-run
        run: deno publish --dry-run
