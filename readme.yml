# Auto-generated README schema
# Sources: contracts.toml, mise.toml
$schema: ./schemas/readme-schema.json
project:
  name: Pushd DevTools
  description: >-
    A centralized and sandboxed environment for development tools,
    configurations, and their associated runtimes
  problem_statement: >
    Core projects often rely on specific, sometimes outdated, runtime versions.
    This

    dependency can prevent the adoption of newer development tools which require

    more recent runtimes. Upgrading core project runtimes directly can be
    complex,

    risky, and time-consuming.
  solution: >
    Sandboxed & Linked Tooling that acts as a central, up-to-date source for
    development tools and

    their necessary environments through:


    1. **Sandboxing:** Tools and runtimes are managed within this repository,
       separate from target projects
    2. **Symlinking:** Configuration directories (`.vscode` and `.trunk`) are
       maintained as templates and symlinked into target projects
    3. **Git Exclusion:** Target projects exclude these symlinked directories in
       their `.gitignore` files
contracts:
  - id: repo-contract
    title: pushd-devtools Repository Contract
    provides:
      - Managed tool versions via mise.toml
      - Configuration templates in the templates/ directory
      - Transformation logic between configuration formats
      - Scripts for synchronizing configurations
    expects:
      - mise to be installed on the developer's machine
      - PUSHD_DEVTOOLS_DIR environment variable to be set
      - Target projects to implement the Target Project Contract
    guarantees:
      - Tool versions will be compatible with templates
      - Templates will be kept in sync with tool versions
      - Configuration transformations will be bidirectional and consistent
  - id: target-project-contract
    title: Target Project Contract
    provides:
      - A workspace to place symlinked configurations
      - A .gitignore file that excludes the symlinked directories
    expects:
      - Access to the pushd-devtools repository via PUSHD_DEVTOOLS_DIR
      - Scripts to set up appropriate symlinks
    guarantees:
      - Will not modify the symlinked configurations directly
      - Will not commit the symlinked configurations to version control
  - id: mise-contract
    title: mise Tool Manager Contract
    provides:
      - Tool version management via mise.toml
      - Task definitions in mise.toml
      - Consistent environment variables
    expects:
      - mise to be installed
      - Tool versions to be specified in mise.toml
    guarantees:
      - Tools will be installed in isolated environments
      - Tasks will run with the correct tool versions
      - Environment variables will be consistent
configuration:
  mise_toml:
    code_from_file: ./mise.toml
    description: Core project configuration and task definitions managed by mise.toml.
tasks:
  - id: setup-symlinks
    command: mise run setup-symlinks
    description: Create symlinks from pushd-devtools templates to target project
  - id: setup-env
    command: mise run setup-env
    description: Configure PUSHD_DEVTOOLS_DIR environment variable in shell configuration
  - id: setup-all
    command: mise run setup-all
    description: >-
      Run all setup steps (install tools, configure environment, create
      symlinks)
  - id: trunk-check
    command: mise run trunk-check
    description: Run Trunk checks
  - id: trunk-fmt
    command: mise run trunk-fmt
    description: Format code using Trunk
  - id: trunk-upgrade
    command: mise run trunk-upgrade
    description: Upgrade Trunk plugins
  - id: sync-trunk-versions
    command: mise run sync-trunk-versions
    description: Sync linter versions from .trunk/trunk.yaml to mise.toml
  - id: trunk-upgrade-and-sync
    command: mise run trunk-upgrade-and-sync
    description: Upgrade Trunk plugins and sync versions back to mise.toml
  - id: transform-apply
    command: mise run transform-apply
    description: 'Apply generated transformations (e.g., mise.toml -> trunk.yaml)'
  - id: generate-schema
    command: mise run generate-schema
    description: Generate readme.yml from mise.toml and format using Trunk
  - id: validate-schema
    command: mise run validate-schema
    description: Validate readme.yml against the JSON schema
  - id: generate-readme
    command: mise run generate-readme
    description: Generate README.md from readme.yml and format using Trunk
  - id: check-contracts
    command: mise run check-contracts
    description: >-
      Check if all required contract files (e.g., contracts.toml) exist in the
      project root, based on mise.toml config.
  - id: deno-test
    command: mise run deno-test
    description: Run Deno tests
  - id: clone
    command: mise run clone
    description: >-
      Clone the pushd-devtools repository (pass repo URL and destination path as
      arguments)
  - id: generate-gitignore
    command: mise run generate-gitignore
    description: Generate .gitignore file from contracts.toml structure
  - id: contracts-validate-structure
    command: mise run contracts-validate-structure
    description: >-
      Validate that the repository structure matches contracts.toml (including
      schema check)
  - id: contracts-add-untracked
    command: mise run contracts-add-untracked
    description: >-
      Add untracked files/directories found on the filesystem to contracts.toml
      [structure]
  - id: contracts-generate-structure
    command: mise run contracts-generate-structure
    description: >-
      Create missing files/directories defined in contracts.toml [structure]
      (skips symlinks)
  - id: contracts-prune-structure
    command: mise run contracts-prune-structure
    description: >-
      Remove entries from contracts.toml [structure] that do not exist on the
      filesystem
  - id: contracts-sort-structure
    command: mise run contracts-sort-structure
    description: 'Sort and deduplicate the [structure] section in contracts.toml'
  - id: contracts-clean
    command: mise run contracts-clean
    description: 'Prune, generate, and sort the contracts.toml [structure] section'
  - id: contracts-delete-empty-dirs
    command: mise run contracts-delete-empty-dirs
    description: >-
      Delete empty directories defined in contracts.toml [structure] if
      allow_empty_directory=false
structure:
  - path: .git
    description: Git version control data
  - path: .github
    description: GitHub workflows and configuration
  - path: .gitignore
    description: Defines files excluded from version control
  - path: .ruby-lsp
    description: Ruby language server configuration
  - path: .trunk
    description: Trunk configuration directory
  - path: .vscode
    description: VSCode configuration directory
  - path: deno.json
    description: Deno runtime configuration
  - path: deno.lock
    description: Locked Deno dependencies
  - path: global
    description: Global settings inherited by all subfolders
  - path: mise.toml
    description: 'Tool versions, environment variables, and tasks'
  - path: README.md
    description: Generated documentation
  - path: readme.yml
    description: Schema for README generation
  - path: runtimes
    description: Runtime environments
  - path: scripts
    description: Helper scripts for setup and configuration
    children:
      - path: generate-readme.ts
        description: Generates README.md from schema
      - path: generate-schema-from-mise.ts
        description: Generates readme.yml from mise.toml
      - path: sync-trunk-versions.ts
        description: Syncs versions from Trunk to mise
      - path: transform-apply.ts
        description: Applies configuration transformations
  - path: src
    description: Source code for transformations and utilities
    children:
      - path: transformation
        description: Transformation engine
        children:
          - path: engine
            description: Core transformation logic
  - path: templates
    description: Configuration templates for symlinks
    children:
      - path: trunk
        description: Trunk.io configuration
      - path: vscode
        description: VS Code settings and extensions
  - path: tests
    description: Test files
