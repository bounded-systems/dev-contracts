# Pushd DevTools Setup
# This file contains setup instructions and IDE integration information

# Setup information
[setup]
[setup.prerequisites]
devtools = [
  "Git for cloning this repository",
  "mise version manager (formerly rtx)",
  "Deno runtime for setup scripts"
]
target_projects = [
  "Git",
  "Unix-like shell environment",
  "Editor extensions for full functionality"
]

[[setup.installation]]
step = "Clone this Repository"
code = "deno run -A https://raw.githubusercontent.com/yourusername/pushd-devtools/main/scripts/clone.ts"
detail = "Clone the pushd-devtools repository to your local machine (defaults to ~/dev/pushd-devtools)"

[[setup.installation]]
step = "Clone with Custom Options"
code = "deno run -A https://raw.githubusercontent.com/yourusername/pushd-devtools/main/scripts/clone.ts [repo-url] [destination-path]"
detail = "Clone with a custom repository URL and destination path"

[[setup.installation]]
step = "Install required tools"
code = "cd ~/dev/pushd-devtools && mise install"
detail = "Navigate to the repository and install required tools"

[[setup.installation]]
step = "Set Environment Variable and Create Symlinks"
code = "cd ~/dev/pushd-devtools && mise run setup-all"
detail = "Run the setup tasks that will configure your environment and create symlinks"

[[setup.installation]]
step = "Alternative: Manual Setup Steps"
detail = "If you prefer to run each step individually:"
code = """
# Set environment variable
cd ~/dev/pushd-devtools && mise run setup-env

# Create symlinks (from target project directory)
cd ~/your-project && mise -C ~/dev/pushd-devtools run setup-symlinks
"""

# .gitignore additions for target projects
[setup.gitignore]
content = """
.vscode/
.trunk/
"""
detail = "Add these lines to your target project's .gitignore file to exclude symlinked directories"

# IDE integration
[ide_integration]
vscode = [
  "Install the [mise-vscode](https://github.com/hverlin/mise-vscode/) extension",
  "The extension will automatically configure other tools to use mise-managed versions"
]
jetbrains = [
  "Install the [intellij-mise](https://github.com/134130/intellij-mise) plugin",
  "Add mise shims to your PATH"
]

[ide_integration.vim_neovim]
code = """
" Vim
let $PATH = $HOME . '/.local/share/mise/shims:' . $PATH
"""
code_alt = """
-- Neovim
vim.env.PATH = vim.env.HOME .. "/.local/share/mise/shims:" .. vim.env.PATH
""" 
