# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.10
lint:
  enabled:
    - standardrb@1.49.0
    - yamllint@1.32.0
    - rubocop@1.57.1
    - prettier@3.2.5
    - json-schema-validator@1.0.0
  disabled:
    - rufo
    - brakeman
actions:
  enabled:
    - trunk-fmt-pre-commit
    - trunk-check-pre-push
  disabled:
    - trunk-announce
runtimes:
  enabled:
    - ruby@3.2.2
    - node@18.0.0
  definitions:
    - type: ruby
      version: 3.2.2
      system_version: ignored
      runtime_environment:
        - name: BUNDLE_GEMFILE
          value: "$PUSHD_DEVTOOLS_DIR/runtimes/ruby/Gemfile"
    - type: node
      version: 18.0.0
      system_version: ignored
      runtime_environment:
        - name: NODE_ENV
          value: development
      package_manager:
        type: npm
        package_file: $PUSHD_DEVTOOLS_DIR/runtimes/node/package.json
plugins:
  sources:
    - id: trunk
      ref: v1.6.7
      uri: https://github.com/trunk-io/plugins
