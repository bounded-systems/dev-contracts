# This file controls the behavior of Trunk: https://docs.trunk.io/cli
# To learn more about the format of this file, see https://docs.trunk.io/reference/trunk-yaml
version: 0.1
cli:
  version: 1.22.10
lint:
  enabled:
    - standardrb@1.49.0
    - yamllint@1.32.0
    - rubocop@1.57.1
  disabled:
    - rufo
    - brakeman
actions:
  enabled:
    - trunk-fmt-pre-commit
    - trunk-check-pre-push
  disabled:
    - trunk-announce
runtimes:
  enabled:
    - ruby@3.2.2
  definitions:
    - type: ruby
      version: 3.2.2
      system_version: ignored
      runtime_environment:
        - name: BUNDLE_GEMFILE
          value: ${PUSHD_DEVTOOLS_DIR}/ruby/Gemfile
plugins:
  sources:
    - id: trunk
      ref: v1.6.7
      uri: https://github.com/trunk-io/plugins
