schema = "./schemas/contracts-schema.json"

[quality.lint.standardrb]
depends = ["trunk"]
version = "1.3.0"

[quality.lint.yamllint]
depends = ["trunk"]
version = "1.37.0"

[quality.lint.git-diff-check]
depends = ["trunk"]

[quality.lint.deno]
depends = ["trunk"]
version = "2.2.8"

[rules.structure]
allow_empty_directory = false

[structure.".git"]
type = "directory"
purpose = "Git version control data"
ignores = ["contract"]

