schema = "./src/contracts/schemas/contracts-schema.json"

[schemas]
github-workflow = "https://json.schemastore.org/github-workflow.json"
vscode-settings = "https://raw.githubusercontent.com/ota-meshi/extract-vscode-schemas/main/resources/vscode/schemas/settings/workspace.json"
deno-config = "https://deno.land/x/deno/cli/schemas/config-file.v1.json"
package-json = "https://json.schemastore.org/package.json"
trunk-yaml = "https://static.trunk.io/pub/trunk-yaml-schema.json"
vscode-extensions = "https://raw.githubusercontent.com/ota-meshi/extract-vscode-schemas/main/resources/vscode/schemas/vscode-extensions.json"
vscode-launch = "https://raw.githubusercontent.com/ota-meshi/extract-vscode-schemas/main/resources/vscode/schemas/launch.json"
vscode-tasks = "https://raw.githubusercontent.com/ota-meshi/extract-vscode-schemas/main/resources/vscode/schemas/tasks.json"
eslintrc = "https://json.schemastore.org/eslintrc.json"
partial-eslint-plugins = "https://json.schemastore.org/partial-eslint-plugins.json"

[quality.lint.standardrb]
depends = ["trunk"]
version = "1.3.0"

[quality.lint.yamllint]
depends = ["trunk"]
version = "1.37.0"

[quality.lint.git-diff-check]
depends = ["trunk"]

[quality.lint.deno]
depends = ["trunk"]
version = "2.2.8"

[rules.structure]
allow_empty_directory = false
validate_schema = true

[structure.".git"]
type = "directory"
purpose = "Git version control data"
ignores = ["contract"]

[structure.".github"]
type = "directory"
purpose = "GitHub workflows and configuration"

[structure.".github/workflows"]
type = "directory"
purpose = "Directory containing GitHub Actions workflow files"

[structure.".github/workflows/ci.yml"]
type = "file"
purpose = "Defines the Continuous Integration workflow for GitHub Actions"
schema_ref = "github-workflow"

[structure.".gitignore"]
type = "file"
purpose = "Defines files excluded from version control"

[structure.".ruby-lsp"]
type = "directory"
purpose = "Ruby language server configuration"

[structure.".ruby-lsp/.gitignore"]
