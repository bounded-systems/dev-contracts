schema = "./schemas/contracts-schema.json"

[project]
name = "Pushd DevTools"
description = "A centralized and sandboxed environment for development tools, configurations, and their associated runtimes"
problem_statement = "Core projects often rely on specific, sometimes outdated, runtime versions. This\ndependency can prevent the adoption of newer development tools which require\nmore recent runtimes. Upgrading core project runtimes directly can be complex,\nrisky, and time-consuming.\n"
solution = "Sandboxed & Linked Tooling that acts as a central, up-to-date source for development tools and\ntheir necessary environments through:\n\n1. **Sandboxing:** Tools and runtimes are managed within this repository,\n   separate from target projects\n2. **Symlinking:** Configuration directories (`.vscode` and `.trunk`) are\n   maintained as templates and symlinked into target projects\n3. **Git Exclusion:** Target projects exclude these symlinked directories in\n   their `.gitignore` files\n"

[devtools.trunk]

[[devtools.trunk.enabled_linters]]
name = "standardrb"
version = "1.3.0"

[[devtools.trunk.enabled_linters]]
name = "yamllint"
version = "1.37.0"

[[devtools.trunk.enabled_linters]]
name = "git-diff-check"

[[devtools.trunk.enabled_linters]]
name = "deno"
version = "2.2.8"

[external_files]
setup = "setup.toml"
roadmap = "roadmap.toml"

[definitions]

[[definitions.items]]
id = "repo-contract"
title = "pushd-devtools Repository Contract"
provides = ["Managed tool versions via mise.toml","Configuration templates in the templates/ directory","Transformation logic between configuration formats","Scripts for synchronizing configurations"]
expects = ["mise to be installed on the developer's machine","PUSHD_DEVTOOLS_DIR environment variable to be set","Target projects to implement the Target Project Contract"]
guarantees = ["Tool versions will be compatible with templates","Templates will be kept in sync with tool versions","Configuration transformations will be bidirectional and consistent"]

[[definitions.items]]
id = "target-project-contract"
title = "Target Project Contract"
provides = ["A workspace to place symlinked configurations","A .gitignore file that excludes the symlinked directories"]
expects = ["Access to the pushd-devtools repository via PUSHD_DEVTOOLS_DIR","Scripts to set up appropriate symlinks"]
guarantees = ["Will not modify the symlinked configurations directly","Will not commit the symlinked configurations to version control"]

[[definitions.items]]
id = "mise-contract"
title = "mise Tool Manager Contract"
provides = ["Tool version management via mise.toml","Task definitions in mise.toml","Consistent environment variables"]
expects = ["mise to be installed","Tool versions to be specified in mise.toml"]
guarantees = ["Tools will be installed in isolated environments","Tasks will run with the correct tool versions","Environment variables will be consistent"]

