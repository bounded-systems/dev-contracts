version: 0.1
cli:
  version: 1.22.12
lint:
  enabled:
    - standardrb@1.3.0
    - yamllint@1.37.0
    - git-diff-check
    - deno@2.2.8
  disabled:
    - rufo
    - brakeman
    - rubocop-rails
    - bundler-audit
    - rubocop
    - eslint
    - prettier
actions:
  enabled:
    - trunk-upgrade-available
    - trunk-fmt-pre-commit
    - trunk-check-pre-push
  disabled:
    - trunk-announce
runtimes:
  enabled:
    - python@3.10.8
    - ruby@3.3.3
  definitions:
    - type: ruby
      runtime_environment:
        - name: BUNDLE_GEMFILE
          value: $DEVCONTRACTS_DIR/runtimes/ruby/Gemfile
        - name: BUNDLE_PATH
          value: $DEVCONTRACTS_DIR/runtimes/ruby/vendor/bundle
        - name: BUNDLE_WITHOUT
          value: 'production:staging'
        - name: GEM_HOME
          value: $DEVCONTRACTS_DIR/runtimes/ruby/vendor/bundle
      version: 3.3.3
    - type: node
      version: 20.14.0
      runtime_environment:
        - name: NODE_ENV
          value: development
        - name: PACKAGE_FILE
          value: $DEVCONTRACTS_DIR/runtimes/node/package.json
plugins:
  sources:
    - id: trunk
      ref: v1.6.7
      uri: 'https://github.com/trunk-io/plugins'
