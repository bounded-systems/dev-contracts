version: 0.1
cli:
  version: 1.22.11
plugins:
  sources:
    - id: trunk
      ref: v1.6.7
      uri: "https://github.com/trunk-io/plugins"
downloads:
  - name: deno
    downloads:
      - os:
          linux: linux
          macos: darwin
          windows: windows
        cpu:
          x86_64: x86_64
          arm_64: aarch64
        url: >-
          https://github.com/denoland/deno/releases/download/v${version}/deno-${cpu}-${os}.zip
tools:
  definitions:
    - name: deno
      download: deno
      known_good_version: 2.2.4
      shims:
        - deno
runtimes:
  enabled:
    - node@20.14.0
    - ruby@3.3.3
lint:
  enabled:
    - git-diff-check
    - markdownlint@0.44.0
    - oxipng@9.1.4
    - prettier@3.5.3
    - rubocop@1.65.0
    - shellcheck@0.10.0
    - taplo@0.9.2
    - standardrb@1.49.0
    - yamllint@1.37.0
    - eslint@9.24.0
actions:
  enabled:
    - trunk-check-pre-push
    - trunk-fmt-pre-commit
    - trunk-upgrade-available
